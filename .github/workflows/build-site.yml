on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

name: build-site

jobs:
  quarto-netlify:
    runs-on: ubuntu-latest
    env:
      GITHUB_PAT: ${{ secrets.GITHUB_TOKEN }}
    steps:
      - uses: actions/checkout@v3
      - name: Setup r2u
        uses: eddelbuettel/github-actions/r2u-setup@master
      - run: /usr/bin/sudo DEBIAN_FRONTEND=noninteractive apt install r-recommended -y
      - uses: quarto-dev/quarto-actions/setup@v2
      - name: Render
        run: R --no-save < render.R
      - name: netlify deploy
        uses: animint/animint-actions/netlify-deploy-comment@main
        with:
          netlify_auth_token: ${{ secrets.NETLIFY_AUTH_TOKEN }}
          netlify_site_id: ${{ secrets.NETLIFY_SITE_ID }}
          pat_github_pr: ${{ secrets.PAT_GITHUB_PR }}
          path: _site
          netlify_url: gfpop-rules-blog.netlify.app
